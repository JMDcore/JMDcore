<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Laboratorio JMDcore</title>
  <desc id="desc">Visualización de las áreas principales de JMDcore: software, inteligencia artificial, automatización y producto.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1000" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="line" x1="143" y1="217" x2="857" y2="217" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 218) rotate(90) scale(104)">
      <stop stop-color="#38bdf8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.08"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="430" rx="24" fill="url(#panel)"/>
  <rect x="1" y="1" width="998" height="428" rx="23" stroke="#1f2937" stroke-width="2"/>
  <path d="M120 215H880" stroke="url(#line)" stroke-width="2" opacity="0.25"/>
  <path d="M500 88V344" stroke="url(#line)" stroke-width="2" opacity="0.25"/>

  <text x="50" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Laboratorio JMDcore</text>
  <text x="50" y="88" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Un espacio para mezclar software, IA y automatización con proyectos reales.</text>

  <circle cx="500" cy="218" r="108" fill="url(#core)" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="500" cy="218" r="70" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
  <text x="500" y="205" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">JMDcore</text>
  <text x="500" y="233" text-anchor="middle" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">software + IA</text>

  <g>
    <rect x="70" y="130" width="260" height="86" rx="16" fill="#0b1220" stroke="#1d4ed8"/>
    <text x="96" y="162" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Desarrollo de software</text>
    <text x="96" y="188" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Crear herramientas útiles,</text>
    <text x="96" y="208" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">claras y mantenibles.</text>
  </g>

  <g>
    <rect x="670" y="130" width="260" height="86" rx="16" fill="#0b1220" stroke="#0f766e"/>
    <text x="696" y="162" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">IA aplicada</text>
    <text x="696" y="188" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Aprender, construir y ampliar</text>
    <text x="696" y="208" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">capacidades con inteligencia.</text>
  </g>

  <g>
    <rect x="70" y="254" width="260" height="86" rx="16" fill="#0b1220" stroke="#0369a1"/>
    <text x="96" y="286" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Automatización</text>
    <text x="96" y="312" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Eliminar tareas repetitivas</text>
    <text x="96" y="332" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">y acelerar workflows.</text>
  </g>

  <g>
    <rect x="670" y="254" width="260" height="86" rx="16" fill="#0b1220" stroke="#059669"/>
    <text x="696" y="286" fill="#bbf7d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Producto</text>
    <text x="696" y="312" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Convertir ideas en soluciones</text>
    <text x="696" y="332" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">que se puedan usar de verdad.</text>
  </g>

  <path d="M330 172C382 170 414 185 430 205" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M670 172C618 170 586 185 570 205" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
  <path d="M330 298C382 300 414 285 430 231" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M670 298C618 300 586 285 570 231" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>

  <rect x="244" y="374" width="512" height="34" rx="17" fill="#020617" stroke="#1e293b"/>
  <text x="500" y="396" text-anchor="middle" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">objetivo: construir más rápido, con más criterio y menos trabajo repetitivo</text>
</svg>
