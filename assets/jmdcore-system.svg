<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sistema de trabajo JMDcore</title>
  <desc id="desc">Mapa visual del sistema de trabajo: aprender, prototipar, automatizar, entregar y mejorar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="205" y1="93" x2="790" y2="272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="360" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="998" height="358" rx="23" stroke="#1e293b" stroke-width="2"/>

  <circle cx="156" cy="72" r="92" fill="#2563eb" opacity="0.12"/>
  <circle cx="842" cy="288" r="130" fill="#14b8a6" opacity="0.12"/>
  <path d="M158 190C250 95 360 71 489 137C613 201 720 164 838 78" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>

  <text x="50" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Sistema JMDcore</text>
  <text x="50" y="86" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Aprender rápido, automatizar lo repetitivo y convertir ideas en software útil.</text>

  <g filter="url(#softGlow)">
    <rect x="380" y="105" width="240" height="112" rx="18" fill="#0f172a" stroke="url(#accent)" stroke-width="2"/>
    <text x="500" y="148" text-anchor="middle" fill="#e0f2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">IA aplicada</text>
    <text x="500" y="178" text-anchor="middle" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">como motor de eficiencia</text>
  </g>

  <g>
    <rect x="50" y="130" width="220" height="50" rx="12" fill="#111827" stroke="#1e40af"/>
    <text x="74" y="161" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Problemas reales</text>
    <rect x="50" y="194" width="220" height="50" rx="12" fill="#111827" stroke="#1e40af"/>
    <text x="74" y="225" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Curiosidad técnica</text>
    <rect x="50" y="258" width="220" height="50" rx="12" fill="#111827" stroke="#1e40af"/>
    <text x="74" y="289" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Aprendizaje constante</text>
  </g>

  <g>
    <rect x="730" y="130" width="220" height="50" rx="12" fill="#111827" stroke="#0f766e"/>
    <text x="754" y="161" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Software útil</text>
    <rect x="730" y="194" width="220" height="50" rx="12" fill="#111827" stroke="#0f766e"/>
    <text x="754" y="225" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Flujos automatizados</text>
    <rect x="730" y="258" width="220" height="50" rx="12" fill="#111827" stroke="#0f766e"/>
    <text x="754" y="289" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Interfaces claras</text>
  </g>

  <path d="M280 155H356" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M356 155L344 147M356 155L344 163" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M644 155H720" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
  <path d="M720 155L708 147M720 155L708 163" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>

  <g>
    <rect x="178" y="328" width="644" height="1" fill="#334155"/>
    <text x="196" y="316" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">aprender</text>
    <text x="322" y="316" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">prototipar</text>
    <text x="468" y="316" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">automatizar</text>
    <text x="628" y="316" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">entregar</text>
    <text x="750" y="316" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">mejorar</text>
  </g>
</svg>
