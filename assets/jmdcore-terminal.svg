<svg width="860" height="416" viewBox="0 0 860 416" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terminal JMDcore</title>
  <desc id="desc">Ventana estilo terminal con un resumen en formato objeto de José Miguel Díaz y la marca JMDcore.</desc>
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="860" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g>
    <rect x="1" y="1" width="858" height="414" rx="22" fill="url(#chrome)" stroke="#334155" stroke-width="2"/>
    <path d="M1 42H859" stroke="#334155" stroke-width="2"/>
    <path d="M1 22C1 10.4 10.4 1 22 1H838C849.6 1 859 10.4 859 22V42H1V22Z" fill="url(#bar)"/>

    <circle cx="31" cy="21" r="7" fill="#ff5f57"/>
    <circle cx="55" cy="21" r="7" fill="#ffbd2e"/>
    <circle cx="79" cy="21" r="7" fill="#28c840"/>

    <text x="430" y="26" text-anchor="middle" fill="#94a3b8" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13">jmdcore.dev — perfil</text>

    <text x="32" y="80" fill="#14b8a6" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17" font-weight="700">➜</text>
    <text x="62" y="80" fill="#38bdf8" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17" font-weight="700">~/JMDcore</text>
    <text x="168" y="80" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17">perfil --about</text>

    <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="16">
      <text x="32" y="124">
        <tspan fill="#f87171">const</tspan>
        <tspan fill="#e2e8f0"> joseMiguelDiaz </tspan>
        <tspan fill="#60a5fa">=</tspan>
        <tspan fill="#e2e8f0"> {</tspan>
      </text>
      <text x="62" y="160">
        <tspan fill="#7dd3fc">marca</tspan>
        <tspan fill="#e2e8f0">: </tspan>
        <tspan fill="#a7f3d0">"JMDcore"</tspan>
        <tspan fill="#e2e8f0">,</tspan>
      </text>
      <text x="62" y="196">
        <tspan fill="#7dd3fc">enfoque</tspan>
        <tspan fill="#e2e8f0">: [</tspan>
      </text>
      <text x="108" y="232">
        <tspan fill="#a7f3d0">"software"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
        <tspan fill="#a7f3d0">"IA aplicada"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
      </text>
      <text x="108" y="268">
        <tspan fill="#a7f3d0">"automatización"</tspan>
        <tspan fill="#e2e8f0">],</tspan>
      </text>
      <text x="62" y="304">
        <tspan fill="#7dd3fc">ahora</tspan>
        <tspan fill="#e2e8f0">: [</tspan>
      </text>
      <text x="108" y="340">
        <tspan fill="#a7f3d0">"terminando Ingeniería Informática"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
        <tspan fill="#a7f3d0">"proyectos propios"</tspan>
        <tspan fill="#e2e8f0">],</tspan>
      </text>
      <text x="62" y="376">
        <tspan fill="#7dd3fc">mentalidad</tspan>
        <tspan fill="#e2e8f0">: </tspan>
        <tspan fill="#a7f3d0">"aprender, automatizar y construir"</tspan>
        <tspan fill="#e2e8f0">,</tspan>
      </text>
      <text x="32" y="402">
        <tspan fill="#e2e8f0">};</tspan>
        <tspan fill="#38bdf8" filter="url(#glow)">▍</tspan>
      </text>
    </g>
  </g>
</svg>
