<svg width="1000" height="500" viewBox="0 0 1000 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terminal JMDcore</title>
  <desc id="desc">Ventana estilo terminal con un resumen en formato objeto de José Miguel Díaz y la marca JMDcore.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1000" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="chrome" x1="70" y1="42" x2="930" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="bar" x1="70" y1="42" x2="930" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="30" y="10" width="940" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" rx="28" fill="url(#page)"/>
  <circle cx="130" cy="76" r="92" fill="#2563eb" opacity="0.12"/>
  <circle cx="855" cy="330" r="128" fill="#14b8a6" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="70" y="42" width="860" height="416" rx="22" fill="url(#chrome)" stroke="#334155" stroke-width="2"/>
    <path d="M70 84H930" stroke="#334155" stroke-width="2"/>
    <rect x="70" y="42" width="860" height="42" rx="22" fill="url(#bar)"/>
    <path d="M70 64C70 51.85 79.85 42 92 42H908C920.15 42 930 51.85 930 64V84H70V64Z" fill="url(#bar)"/>

    <circle cx="101" cy="63" r="7" fill="#ff5f57"/>
    <circle cx="125" cy="63" r="7" fill="#ffbd2e"/>
    <circle cx="149" cy="63" r="7" fill="#28c840"/>

    <text x="500" y="68" text-anchor="middle" fill="#94a3b8" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13">jmdcore.dev — perfil</text>

    <text x="102" y="122" fill="#14b8a6" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17" font-weight="700">➜</text>
    <text x="132" y="122" fill="#38bdf8" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17" font-weight="700">~/JMDcore</text>
    <text x="238" y="122" fill="#cbd5e1" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="17">perfil --about</text>

    <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="16">
      <text x="102" y="166">
        <tspan fill="#f87171">const</tspan>
        <tspan fill="#e2e8f0"> joseMiguelDiaz </tspan>
        <tspan fill="#60a5fa">=</tspan>
        <tspan fill="#e2e8f0"> {</tspan>
      </text>
      <text x="132" y="202">
        <tspan fill="#7dd3fc">marca</tspan>
        <tspan fill="#e2e8f0">: </tspan>
        <tspan fill="#a7f3d0">"JMDcore"</tspan>
        <tspan fill="#e2e8f0">,</tspan>
      </text>
      <text x="132" y="238">
        <tspan fill="#7dd3fc">enfoque</tspan>
        <tspan fill="#e2e8f0">: [</tspan>
      </text>
      <text x="178" y="274">
        <tspan fill="#a7f3d0">"software"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
        <tspan fill="#a7f3d0">"IA aplicada"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
      </text>
      <text x="178" y="310">
        <tspan fill="#a7f3d0">"automatización"</tspan>
        <tspan fill="#e2e8f0">],</tspan>
      </text>
      <text x="132" y="346">
        <tspan fill="#7dd3fc">ahora</tspan>
        <tspan fill="#e2e8f0">: [</tspan>
      </text>
      <text x="178" y="382">
        <tspan fill="#a7f3d0">"terminando Ingeniería Informática"</tspan>
        <tspan fill="#e2e8f0">, </tspan>
        <tspan fill="#a7f3d0">"proyectos propios"</tspan>
        <tspan fill="#e2e8f0">],</tspan>
      </text>
      <text x="132" y="418">
        <tspan fill="#7dd3fc">mentalidad</tspan>
        <tspan fill="#e2e8f0">: </tspan>
        <tspan fill="#a7f3d0">"aprender, automatizar y construir"</tspan>
        <tspan fill="#e2e8f0">,</tspan>
      </text>
      <text x="102" y="454">
        <tspan fill="#e2e8f0">};</tspan>
        <tspan fill="#38bdf8" filter="url(#glow)">▍</tspan>
      </text>
    </g>
  </g>
</svg>
